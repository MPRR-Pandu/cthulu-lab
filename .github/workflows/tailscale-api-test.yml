# Tailscale VPN API Testing Workflow
#
# This workflow connects to Tailscale and runs API tests against
# endpoints protected by a Tailscale IP firewall.
#
# Use cases:
# - Run integration tests against internal APIs
# - Health checks for protected services
# - Automated API monitoring on schedule
#
# Prerequisites: Same as tailscale-connect.yml

name: Tailscale API Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for API tests'
        required: false
        type: string
  schedule:
    # Run health checks every 6 hours (adjust as needed)
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - '.github/workflows/tailscale-api-test.yml'

env:
  # Default base URL - override with input or secret
  API_BASE_URL: ${{ inputs.base_url || secrets.API_BASE_URL || 'https://api.example.com' }}

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Uncomment to wait for specific host connectivity:
          # ping: your-internal-host.tailnet-name.ts.net

      - name: Wait for network propagation
        run: |
          echo "Waiting for Tailscale network to stabilize..."
          sleep 5
          tailscale status

      - name: Run API health checks
        run: |
          echo "=== Running API Health Checks ==="
          echo "Base URL: $API_BASE_URL"
          echo ""

          # Health check endpoint
          echo "Testing health endpoint..."
          curl -sf "$API_BASE_URL/health" || echo "Health endpoint not available"

          # Add more API tests as needed
          echo ""
          echo "=== API Tests Complete ==="

      - name: Run custom API tests
        run: |
          # Example: Test multiple endpoints
          declare -a ENDPOINTS=(
            "/health"
            "/api/v1/status"
            # Add your endpoints here
          )

          FAILED=0
          for endpoint in "${ENDPOINTS[@]}"; do
            echo "Testing: $API_BASE_URL$endpoint"
            if curl -sf --max-time 30 "$API_BASE_URL$endpoint" > /dev/null 2>&1; then
              echo "  OK"
            else
              echo "  FAILED"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo ""
            echo "WARNING: $FAILED endpoint(s) failed"
            # Uncomment to fail the workflow:
            # exit 1
          fi

      # Optional: Run actual test framework
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Run Jest API tests
      #   run: npm run test:api
      #   env:
      #     API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Summary
        if: always()
        run: |
          echo "=== Workflow Summary ==="
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "Tested URL: $API_BASE_URL"
