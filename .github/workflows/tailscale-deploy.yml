# Tailscale VPN Deployment Workflow Template
#
# This workflow template shows how to deploy to infrastructure
# protected by a Tailscale IP firewall.
#
# Common use cases:
# - Deploy to Kubernetes cluster behind Tailscale
# - SSH to servers on your tailnet
# - Push to private container registry
# - Run database migrations
#
# Prerequisites: Same as tailscale-connect.yml

name: Tailscale Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Dry run (no actual deployment)'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure exit node
        run: |
          EXIT_NODE="${{ secrets.TS_EXIT_NODE }}"
          if [ -n "$EXIT_NODE" ]; then
            echo "Configuring exit node: $EXIT_NODE"
            sudo tailscale set --exit-node="$EXIT_NODE"
          fi

      - name: Verify VPN connectivity
        run: |
          echo "Connected to Tailscale"
          tailscale status
          echo ""
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "Public IP: $(curl -s https://ifconfig.me)"

      # ============================================================
