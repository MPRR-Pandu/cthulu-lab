name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=$(gh api repos/${{ github.repository }} --jq '.full_name' 2>/dev/null || echo "")
          if [ -z "$REPO" ]; then
            echo "::error::Cannot access repository — check GITHUB_TOKEN"
            exit 1
          fi
          echo "✅ Token valid for $REPO — proceeding with release"

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
            DRAFT="${{ inputs.draft }}"
          else
            RAW_TAG="${{ github.ref_name }}"
            DRAFT="true"
          fi
          # Strip the leading `v` for the binary version (semver — "1.2.3").
          # Keep the original tag for the GitHub release name.
          VERSION="${RAW_TAG#v}"
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"

      - name: Sync version into Tauri / Cargo / package.json
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          echo "Setting product version to ${VERSION}"
          # tauri.conf.json — drives the DMG file name (Cthulu Lab_<version>_<arch>.dmg)
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          # Cargo.toml
          sed -E -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          # package.json
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          # Show what we ended up with so the log is auditable
          grep '"version"' src-tauri/tauri.conf.json package.json
          grep '^version' src-tauri/Cargo.toml

      - name: Build Tauri app (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: "Cthulu Lab ${{ steps.tag.outputs.tag }}"
          releaseBody: |
            ## Cthulu Lab ${{ steps.tag.outputs.tag }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `Cthulu Lab_${{ steps.tag.outputs.version }}_universal.dmg` |

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: ${{ steps.tag.outputs.draft }}
          prerelease: false
          includeUpdaterJson: false
          # --config skips the project's `tsc && vite build` (tsc has known
          # pre-existing errors) and runs vite build only. Drop the override
          # once tsc is clean again.
          args: '--target universal-apple-darwin --bundles dmg --config {"build":{"beforeBuildCommand":"npx vite build"}}'
