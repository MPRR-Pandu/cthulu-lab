name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

# Verify the workflow has required permissions before running expensive builds
permissions:
  contents: write

jobs:
  # Gate: check org/repo permissions before running the build
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      can-release: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check workflow permissions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verify GITHUB_TOKEN has contents:write by checking token permissions
          # The GITHUB_TOKEN in Actions doesn't expose .permissions on the repo API,
          # so we check the token's own scopes via the /installation/repositories or
          # simply verify we can read the repo (if we got this far, the workflow ran).
          # The real gate is the `permissions: contents: write` block above —
          # GitHub enforces it at the workflow level.

          # Sanity check: confirm repo exists and token is valid
          REPO=$(gh api repos/${{ github.repository }} --jq '.full_name' 2>/dev/null || echo "")
          if [ -z "$REPO" ]; then
            echo "::error::Cannot access repository — check GITHUB_TOKEN"
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"
          echo "✅ Token valid for $REPO — proceeding with release"

  build-macos:
    needs: check-permissions
    if: needs.check-permissions.outputs.can-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.version }}
          releaseName: "Cthulu Lab ${{ steps.tag.outputs.version }}"
          releaseBody: |
            ## Cthulu Lab ${{ steps.tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `Cthulu-Lab_${{ steps.tag.outputs.version }}_universal.dmg` |

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: ${{ steps.tag.outputs.draft }}
          prerelease: false
          includeUpdaterJson: false
          args: --target universal-apple-darwin --bundles dmg
