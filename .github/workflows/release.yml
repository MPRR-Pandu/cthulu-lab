name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=$(gh api repos/${{ github.repository }} --jq '.full_name' 2>/dev/null || echo "")
          if [ -z "$REPO" ]; then
            echo "::error::Cannot access repository — check GITHUB_TOKEN"
            exit 1
          fi
          echo "✅ Token valid for $REPO — proceeding with release"

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.version }}
          releaseName: "Cthulu Lab ${{ steps.tag.outputs.version }}"
          releaseBody: |
            ## Cthulu Lab ${{ steps.tag.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Universal) | `Cthulu-Lab_${{ steps.tag.outputs.version }}_universal.dmg` |

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: ${{ steps.tag.outputs.draft }}
          prerelease: false
          includeUpdaterJson: false
          args: --target universal-apple-darwin --bundles dmg
